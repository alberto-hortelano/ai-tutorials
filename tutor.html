<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XCS236 Tutor</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="./styles/topnav.css">
  <link rel="stylesheet" href="./styles/tutor.css">
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="tutor-sidebar" aria-hidden="true">
    <div class="sidebar-header">
      <span class="sidebar-title">Conversations</span>
      <button id="btn-sidebar-close" class="sidebar-close-btn" title="Close">&times;</button>
    </div>
    <ul id="conversation-list" class="conversation-list"></ul>
  </aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div class="tutor-main">
    <!-- topnav injected by tutor-main.ts -->
    <main id="tutor-content" class="tutor-content"></main>
    <footer class="tutor-input-bar">
      <input id="tutor-input" type="text" placeholder="Ask a question..." autocomplete="off" />
      <button id="btn-send" class="tutor-send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </footer>
  </div>
  <script type="module" src="./tutor-main.ts"></script>
</body>
</html>
